---
layout: course-specific
---

<div class="content-wrapper">
    <div class="content-wrapper-2">

    <!-- Slideshow container -->
    <div class="slideshow-container">

        <!-- Full-width images with number and caption text -->
        {% for i in (1..page.image_num) %}
            <div class="mySlides fade">
                <div class="numbertext">{{ forloop.index }} / {{ page.image_num }}</div>
                <img src="/assets/image/courses/{{ page.course_id }}/{{ forloop.index0 }}.jpg" style="width:100%" class="image">
                <div class="text">Caption Text</div>
            </div>
        {% endfor %}

        <!-- Next and previous buttons -->
        <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
        <a class="next" onclick="plusSlides(1)">&#10095;</a>
    </div>
    <br>

    <!-- The dots/circles -->
    <div style="text-align:center">
        <span class="dot" onclick="currentSlide(1)"></span>
        <span class="dot" onclick="currentSlide(2)"></span>
        <span class="dot" onclick="currentSlide(3)"></span>
    </div>
    </div>  

    <div class="content-wrapper-2">
        <div class="text-section">
            {{ content }}
        </div>
        <div class="upperButtons">
            <div class="ButtonGroup">
            <button id="DoorButton" onclick="showDoor()">Door Plaque</button> <!--This will be the eventual google drive IFrame.-->
            <button id="FAQButton" onclick="showFAQ()">FAQ</button>
            </div>
        </div>
    </div>
</div>
<script src="/assets/scripts/course.js"></script>
